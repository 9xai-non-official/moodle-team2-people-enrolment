<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Entity relationship diagram of Moodle's enrolment, roles, and groups tables showing how users connect to courses through three separate systems</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  COURSE ||--o{ ENROL : "method instances"
  ENROL ||--o{ USER_ENROLMENTS : "enrols"
  USER ||--o{ USER_ENROLMENTS : "holds"
  USER ||--o{ ROLE_ASSIGNMENTS : "holds"
  ROLE ||--o{ ROLE_ASSIGNMENTS : "grants"
  CONTEXT ||--o{ ROLE_ASSIGNMENTS : "scopes"
  ROLE ||--o{ ROLE_CAPABILITIES : "defines"
  CONTEXT ||--o{ ROLE_CAPABILITIES : "overrides"
  COURSE ||--o| CONTEXT : "level 50 row"
  COURSE ||--o{ GROUPS : "contains"
  GROUPS ||--o{ GROUPS_MEMBERS : "lists"
  USER ||--o{ GROUPS_MEMBERS : "joins"
  COHORT ||--o{ COHORT_MEMBERS : "lists"
  USER ||--o{ COHORT_MEMBERS : "joins"
  ENROL }o..o| COHORT : "customint1"
  USER {
    int id PK
    string username
    tinyint deleted "flag, never removed"
  }
  COURSE {
    int id PK "id 1 is the site front page"
    string shortname
  }
  ENROL {
    int id PK
    int courseid FK
    string enrol "manual, self, cohort..."
    int status "0 enabled, 1 disabled"
    int customint1 "cohort id for enrol_cohort"
    int customint2 "add-to-group id"
  }
  USER_ENROLMENTS {
    int id PK
    int enrolid FK "points at method, not course"
    int userid FK
    int status "0 active, 1 suspended"
    int timestart
    int timeend
  }
  CONTEXT {
    int id PK
    int contextlevel "10 sys, 40 cat, 50 course, 70 mod"
    int instanceid "polymorphic, no real FK"
    string path "slash-delimited ancestry"
  }
  ROLE {
    int id PK
    string shortname
    string archetype
  }
  ROLE_ASSIGNMENTS {
    int id PK
    int roleid FK
    int contextid FK
    int userid FK
    string component "enrol_manual, enrol_cohort"
  }
  ROLE_CAPABILITIES {
    int id PK
    int roleid FK
    int contextid FK "system is default, lower is override"
    string capability
    int permission "1 allow, -1 prevent, -1000 prohibit"
  }
  GROUPS {
    int id PK
    int courseid FK
    string name
  }
  GROUPS_MEMBERS {
    int groupid FK
    int userid FK
    string component "plugins add members too"
  }
  COHORT {
    int id PK
    string name
  }
  COHORT_MEMBERS {
    int cohortid FK
    int userid FK
  }`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
