name: CI · deploy staging

# Why this exists instead of Vercel's Git integration:
#
# The two Vercel projects (whocan, whocan-api) ARE connected to this repo, but
# every push since fd47364 has failed the build with
#   vercel.com/...?upgradeToPro=github-private-org-to-hobby
# i.e. a Hobby-plan account may not Git-deploy a PRIVATE repo owned by a GitHub
# ORGANISATION. The live site has only stayed current because someone runs
# `vercel --prod` by hand. Deploying from Actions with a token is not subject to
# that restriction, so this workflow restores automatic deploys without a paid
# plan — and sends staging to PRODUCTION, which the Git integration never did
# (it only ever produced "Preview - whocan" deployments for this branch).
#
# Setup — four repository secrets, see .github/workflows/README.md:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_API, VERCEL_PROJECT_ID_WEB

on:
  push:
    branches: [staging]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Never let two production deploys race. Queue instead of cancelling, so the
  # newest commit is always the one that ends up live; PR checks may cancel.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FRONTEND: moodle-replica/frontend
  BACKEND: moodle-replica/backend

jobs:
  frontend:
    name: frontend · lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: moodle-replica/frontend/package-lock.json
      - run: npm ci
        working-directory: ${{ env.FRONTEND }}
      - run: npm run lint
        working-directory: ${{ env.FRONTEND }}
      - run: npm run build
        working-directory: ${{ env.FRONTEND }}

  backend:
    name: backend · import + hermetic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Match Vercel's Python runtime, not the newest local interpreter —
          # a version gap here is a deploy that passes CI and fails on Vercel.
          python-version: '3.12'
          cache: pip
          cache-dependency-path: moodle-replica/backend/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: ${{ env.BACKEND }}

      - name: app imports and every router registers
        # Catches a broken import or a bad decorator before Vercel does; this is
        # the check that would have caught a 500-on-boot in seconds.
        run: python -c "import main; print(len(main.app.routes), 'routes registered')"
        working-directory: ${{ env.BACKEND }}

      - name: hermetic tests
        # Only the suites that need no database. The DB-backed ones
        # (tests/test_enrolment.py) talk to the live Supabase instance and are
        # not safe to run from CI on every push; test_groups_routed.py self-skips
        # unless GROUPS_API_URL is set. See README for the two known-failing tests.
        run: |
          python -m pytest -q \
            tests/test_permissions.py \
            tests/test_groups.py \
            tests/test_check_integration.py \
            tests/test_krol.py
        working-directory: ${{ env.BACKEND }}

  deploy-api:
    name: deploy whocan-api → production
    needs: [frontend, backend]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: production-api
      url: https://whocan-api.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: secrets present
        run: |
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository secret $v is not set - see .github/workflows/README.md"
              exit 1
            fi
          done
      - run: npm install --global vercel@latest
      # Deployed from the repo root on purpose: each Vercel project already
      # knows its own Root Directory (moodle-replica/backend here), which is
      # exactly how the Git integration built it back when it worked.
      - name: deploy
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN" > deployment-url.txt
      - name: smoke-test what we just shipped
        run: |
          url=$(cat deployment-url.txt)
          echo "deployed: $url"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o body.json -w '%{http_code}' "https://whocan-api.vercel.app/api/health" || true)
            [ "$code" = "200" ] && break
            echo "attempt $i: HTTP $code - retrying"; sleep 10
          done
          cat body.json; echo
          [ "$code" = "200" ] || { echo "::error::/api/health did not return 200"; exit 1; }
          grep -q '"connected":true' body.json || {
            echo "::error::API is up but reports no database connection"; exit 1; }

  deploy-web:
    name: deploy whocan → production
    needs: [frontend, backend]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: production-web
      url: https://whocan.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: secrets present
        run: |
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository secret $v is not set - see .github/workflows/README.md"
              exit 1
            fi
          done
      - run: npm install --global vercel@latest
      - name: deploy
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN" > deployment-url.txt
      - name: smoke-test what we just shipped
        run: |
          echo "deployed: $(cat deployment-url.txt)"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o page.html -w '%{http_code}' "https://whocan.vercel.app/" || true)
            [ "$code" = "200" ] && break
            echo "attempt $i: HTTP $code - retrying"; sleep 10
          done
          [ "$code" = "200" ] || { echo "::error::whocan.vercel.app did not return 200"; exit 1; }
          grep -qi "whocan" page.html || {
            echo "::error::page served but does not look like the app"; exit 1; }
