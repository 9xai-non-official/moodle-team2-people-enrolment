name: main source guard

# Enforces the team rule: main is updated only by pull request, and only from
# staging. The "pull requests only" half is enforced by the repository ruleset
# on main; this workflow enforces the "only from staging" half, which rulesets
# cannot express.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  source-branch:
    name: source branch must be staging
    runs-on: ubuntu-latest
    steps:
      - name: Check the source branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_REF" != "staging" ]; then
            echo "::error::PRs into main must come from 'staging', but this one comes from '$HEAD_REF'. Merge your work into staging first, then open staging -> main."
            exit 1
          fi
          echo "Source branch is '$HEAD_REF' - OK."
